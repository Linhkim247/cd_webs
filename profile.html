  <style>

    .profile-card{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5px;
  height: max-content;

  position: relative;
  padding: 30px;
  border-radius: 24px;

  /* GLASS */
  background: linear-gradient(
    145deg,
    rgba(255,255,255,0.12),
    rgba(255,255,255,0.05)
  );
  backdrop-filter: blur(22px);
  -webkit-backdrop-filter: blur(22px);

  border: 1px solid rgba(255,255,255,0.18);

  box-shadow:
    0 15px 40px rgba(0,0,0,0.35),
    inset 0 0 0.5px rgba(255,255,255,0.6);

  transition: all 0.35s ease;
}

/* Hover nổi nhẹ */


/* Avatar */
.avatar-frame{
position:relative;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
margin:auto;
}

.avatar{
width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
z-index:2;

border:4px solid rgba(255,255,255,0.85);

box-shadow:
0 10px 25px rgba(0,0,0,0.25);

background:white;
}

/* ================= RANK EFFECT ================= */

/* Bronze */

.frame-bronze{

box-shadow:
0 0 8px rgba(205,127,50,.6);

}

/* Silver */

.frame-silver{

box-shadow:
0 0 12px rgba(200,200,200,.8),
0 0 18px rgba(200,200,200,.4);

}

/* Gold */

.frame-gold{

box-shadow:
0 0 15px rgba(255,215,0,.9),
0 0 25px rgba(255,215,0,.6),
0 0 40px rgba(255,215,0,.3);

}

/* Diamond */

.frame-diamond{

box-shadow:
0 0 18px rgba(0,200,255,.9),
0 0 35px rgba(0,200,255,.7),
0 0 60px rgba(0,200,255,.4);

animation: diamondGlow 4s infinite alternate;

}

/* Legend */

.frame-legend{

box-shadow:
0 0 20px rgba(255,70,120,1),
0 0 40px rgba(255,70,120,.9),
0 0 80px rgba(255,70,120,.6);

animation: legendGlow 3s infinite alternate;

}

/* Mythic */

.frame-mythic{

box-shadow:
0 0 30px #7b2cff,
0 0 60px #7b2cff,
0 0 120px #7b2cff;

animation: mythicGlow 2.5s infinite alternate;

}
.frame-platinum{
box-shadow:
0 0 12px rgba(80,255,200,0.9),
0 0 20px rgba(80,255,200,0.5);

animation:platinumGlow 2.5s infinite alternate;
}

@keyframes platinumGlow{

from{
box-shadow:
0 0 12px rgba(80,255,200,0.8),
0 0 20px rgba(80,255,200,0.4);
}

to{
box-shadow:
0 0 18px rgba(120,255,220,1),
0 0 30px rgba(80,255,200,0.8);
}

}

.frame-master{

box-shadow:
0 0 14px rgba(180,120,255,0.9),
0 0 24px rgba(160,80,255,0.6);

animation:masterGlow 2.2s infinite alternate;

}

@keyframes masterGlow{

from{
box-shadow:
0 0 14px rgba(180,120,255,0.9),
0 0 24px rgba(160,80,255,0.5);
}

to{
box-shadow:
0 0 22px rgba(200,140,255,1),
0 0 34px rgba(160,80,255,0.8);
}

}

.frame-grandmaster{

box-shadow:
0 0 16px rgba(255,80,80,0.9),
0 0 26px rgba(255,40,40,0.7);

animation:gmGlow 2s infinite alternate;

}

@keyframes gmGlow{

from{
box-shadow:
0 0 16px rgba(255,80,80,0.9),
0 0 26px rgba(255,40,40,0.6);
}

to{
box-shadow:
0 0 26px rgba(255,100,100,1),
0 0 40px rgba(255,40,40,0.9);
}

}

/* ================= ANIMATIONS ================= */

@keyframes diamondGlow{

from{
box-shadow:
0 0 18px rgba(0,200,255,.7),
0 0 35px rgba(0,200,255,.5);
}

to{
box-shadow:
0 0 30px rgba(0,200,255,1),
0 0 60px rgba(0,200,255,.8);
}

}

@keyframes legendGlow{

from{
box-shadow:
0 0 20px rgba(255,70,120,.8),
0 0 40px rgba(255,70,120,.6);
}

to{
box-shadow:
0 0 35px rgba(255,70,120,1),
0 0 80px rgba(255,70,120,.9);
}

}

@keyframes mythicGlow{

from{
box-shadow:
0 0 40px #7b2cff,
0 0 80px #7b2cff;
}

to{
box-shadow:
0 0 70px #c88cff,
0 0 140px #c88cff;
}

}


/* Stats */
.profile-stats{
  display:flex;
  gap:30px;
  margin-top:20px;
}

.stat{
  text-align:center;
}

.stat h3{
  font-size:22px;
}

/* Rank */
.rank-text{
  margin-top: 10px;
  font-weight: 500;
  letter-spacing: 0.5px;
  opacity: 0.95;
}
.rank-progress{
font-size:14px;
color:#aaa;
margin-top:5px;
}

/* XP */
.xp-container{
  width: 220px;
  height: 12px;
  margin: 10px 0 20px 0;

  border-radius: 20px;
  overflow: hidden;

  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);

  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  box-shadow: inset 0 0 10px rgba(0,0,0,0.25);
}

.xp-bar{
  height: 100%;
  width: 0%;

  background: linear-gradient(
    90deg,
    #ff4d00,
    #ff9900,
    #ffd000
  );

  box-shadow:
    0 0 12px rgba(255,153,0,0.7);

  transition: width 0.6s cubic-bezier(.4,0,.2,1);
}

/* Extra info */
.profile-extra{
  margin-top: 20px;
  text-align: center;
  opacity: 0.9;
}

.profile-extra p{
  margin: 5px 0;
}

/* ===== Rank Colors ===== */
.rank{
font-weight:700;
padding:6px 14px;
border-radius:14px;
font-size:14px;
letter-spacing:1px;
backdrop-filter:blur(10px);
display:inline-flex;
align-items:center;
gap:6px;

}

.rank svg{
width:18px;
height:18px;
flex-shrink:0;
}

/* Bronze */

.rank-bronze{
color:#cd7f32;
background:linear-gradient(145deg,#3a2a1f,#5a3b2b);
box-shadow:0 0 8px rgba(205,127,50,0.5);
}

/* Silver */

.rank-silver{
color:#e5e5e5;
background:linear-gradient(145deg,#3f3f3f,#6c6c6c);
box-shadow:0 0 10px rgba(200,200,200,0.6);
}

/* Gold */

.rank-gold{
color:#ffd700;
background:linear-gradient(145deg,#5b4a00,#8c7200);
box-shadow:0 0 12px rgba(255,215,0,0.7);
}

/* Diamond */

.rank-diamond{
color:#6be0ff;
background:linear-gradient(145deg,#003c4a,#006a7c);
box-shadow:0 0 14px rgba(100,220,255,0.9);
}

/* Legend */

.rank-legend{
color:#ff59e6;
background:linear-gradient(145deg,#3c0036,#720066);
box-shadow:0 0 16px rgba(255,80,220,0.9);
}

/* Platinum */

.rank-platinum{
color:#7affd4;
background:linear-gradient(145deg,#004a3a,#007a60);
box-shadow:0 0 13px rgba(80,255,200,0.85);
}

/* Master */

.rank-master{
color:#b88cff;
background:linear-gradient(145deg,#2b004d,#4e008a);
box-shadow:0 0 15px rgba(180,120,255,0.9);
}

/* Grandmaster */

.rank-grandmaster{
color:#ff6a6a;
background:linear-gradient(145deg,#4a0000,#820000);
box-shadow:0 0 17px rgba(255,80,80,0.95);
}
/* Mythic */

.rank-mythic{
color:#ff4040;
background:linear-gradient(145deg,#450000,#8a0000);
box-shadow:0 0 18px rgba(255,50,50,1);
animation:mythicGlow 2s infinite alternate;
}

@keyframes mythicGlow{
from{box-shadow:0 0 18px #ff3030}
to{box-shadow:0 0 28px #ff0000}
}

/* ===== XP Glow ===== */

.xp-bar {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #ff4d00, #ff9900);
  box-shadow: 0 0 15px #ff4d00;
  transition: 0.4s ease;
}

/* ===== Badges ===== */

.badge-section{
margin-top:20px;
text-align: center;

}

.badge-container{
display:flex;
flex-wrap:wrap;
gap:10px;
margin-top:10px;
justify-content: center;
}

.badge{
  display:inline-flex;
  align-items:center;
  gap:10px;

  padding:10px 18px;
  margin:6px;

  border-radius:30px;

  font-weight:600;
  font-size:14px;
  color:white;

  background:linear-gradient(135deg,#ff8a00,#ff4d00);

  box-shadow:
    0 6px 15px rgba(255,120,0,0.45),
    inset 0 2px 4px rgba(255,255,255,0.35);
}


@keyframes badgePop{
from{
transform:scale(0);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

/* ===== Achievement ===== */

.achievement-section {
  margin-top: 30px;
  text-align: left;
}

.achievement-section ul {
  list-style: none;
  padding: 0;
}

.achievement-section li {
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}


.admin-badge{

margin-left:8px;

padding:3px 8px;

border-radius:8px;

font-size:12px;
font-weight:700;

background:linear-gradient(
90deg,
#ff0000,
#ff6a00,
#ff0000
);

background-size:200%;

color:white;

animation:adminGlow 3s linear infinite;

box-shadow:
0 0 6px #ff0000,
0 0 12px rgba(255,0,0,0.6);

}

@keyframes adminGlow{

0%{background-position:0%}
100%{background-position:200%}

}

  </style>
