<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
body{
  margin:0;
  height:100vh;
  overflow:hidden;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:"Segoe UI",sans-serif;
  color:white;
}

@keyframes gradientMove {
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* ===== GLASS CARD ===== */
.challenge-box{
  width:350px;
  padding:35px;
  border-radius:25px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border:1px solid rgba(255,255,255,0.15);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  text-align:center;
  color:white;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

.challenge-box h2{
  margin-bottom:15px;
  font-weight:600;
}

.challenge-box p{
  font-size:14px;
  opacity:0.85;
  margin-bottom:30px;
  line-height:1.6;
}

/* ===== GOOGLE BUTTON GLASS ===== */
#googleLogin{
  width:100%;
  padding:12px;
  border-radius:20px;
  border:none;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  color:white;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(10px);
  border:1px solid rgba(255,255,255,0.2);
  transition: all 0.3s ease;
}

/* hover effect */
#googleLogin:hover{
  background: rgba(255,255,255,0.25);
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.4);
}

/* click effect */
#googleLogin:active{
  transform: scale(0.97);
}


/* FIRE CONTAINER */
/* FIRE CONTAINER */
.fire-container{
  position:fixed;
  bottom:0;
  width:100%;
  height:100%;
  z-index:-1;
  display:flex;
  justify-content:center;
  align-items:flex-end;
}

/* FLAME BASE */
.flame{
  position:absolute;
  bottom:0;
  width:300px;
  height:400px;
  border-radius:50% 50% 40% 40%;
  filter: blur(30px);
  mix-blend-mode: screen;
  animation: flicker 3s infinite ease-in-out;
}

/* INNER WHITE HOT */
.flame1{
  background: radial-gradient(circle at 50% 80%,
    #ffffff 0%,
    #ffff66 20%,
    #ffae00 40%,
    #ff4500 60%,
    rgba(255,0,0,0.4) 80%,
    transparent 100%);
}

/* MIDDLE ORANGE */
.flame2{
  background: radial-gradient(circle at 50% 80%,
    #ffcc00 0%,
    #ff6600 40%,
    #ff0000 70%,
    transparent 100%);
  width:400px;
  height:500px;
  animation-duration:4s;
  opacity:0.7;
}

/* OUTER RED GLOW */
.flame3{
  background: radial-gradient(circle at 50% 80%,
    #ff3300 0%,
    #990000 60%,
    transparent 100%);
  width:500px;
  height:600px;
  animation-duration:5s;
  opacity:0.5;
}

@keyframes flicker{
  0%{ transform: scaleY(1) scaleX(1); }
  25%{ transform: scaleY(1.1) scaleX(0.95); }
  50%{ transform: scaleY(0.95) scaleX(1.05); }
  75%{ transform: scaleY(1.15) scaleX(0.9); }
  100%{ transform: scaleY(1) scaleX(1); }
}
</style>
</head>
<body>

<div class="challenge-box">
  <h2>⚔️ Thử Thách Kỷ Luật</h2>
  <p>
    Bạn đã suy nghĩ kỹ chưa?  
    Đây không chỉ là một lần đăng nhập.  
    Đây là bước bắt đầu cho sự thay đổi.  
    Nếu bạn thực sự sẵn sàng, hãy tiếp tục.
  </p>
  <p>-DangCanh-</p>
  <button id="googleLogin">
    Tôi đã sẵn sàng – Đăng nhập bằng Google
  </button>
</div>
<div class="fire-container">
  <div class="flame flame1"></div>
  <div class="flame flame2"></div>
  <div class="flame flame3"></div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } 
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC_EZOZ-ZtU64ov0waxj2_cylX9g6FcKcY",
  authDomain: "ashopvn-42bf4.firebaseapp.com",
  projectId: "ashopvn-42bf4",
  storageBucket: "ashopvn-42bf4.firebasestorage.app",
  messagingSenderId: "681530352530",
  appId: "1:681530352530:web:a3b05dc78350428cac974b",
  measurementId: "G-7KR9TMN5X7"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

document.getElementById("googleLogin").addEventListener("click", async ()=>{

  Swal.fire({
    title: "Đang đăng nhập...",
    allowOutsideClick:false,
    didOpen:()=>Swal.showLoading()
  });

  try{

    await signInWithPopup(auth, provider);

    Swal.fire({
      icon:"success",
      title:"🔥 Chào mừng. Bạn đã tới với thử thách.",
      timer:1200,
      showConfirmButton:false
    });

    setTimeout(()=>{
      window.parent.postMessage(
        { type:"LOGIN_SUCCESS" },
        "*"
      );
    },1200);

  }catch(err){

    Swal.fire({
      icon:"error",
      title:"Lỗi đăng nhập",
      text:err.message
    });

  }

});

xp:0,

},{merge:true});
</script>

</body>
</html>
